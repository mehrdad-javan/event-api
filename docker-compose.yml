version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: event_mysql
    environment:
      MYSQL_DATABASE: event_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3340:3306"
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: event-api:latest
    container_name: event_api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prd
      DB_URL: jdbc:mysql://mysql:3306/event_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Stockholm
      DB_USERNAME: devuser
      DB_PASSWORD: devpass
      # Optional: extra JVM options
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql_data:
